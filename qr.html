<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan & Pay</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            color: white;
        }

        .container {
            background: rgba(0,0,0,0.3);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        h2 {
            margin-bottom: 20px;
        }

        img {
            width: 250px;
            height: auto;
            border-radius: 10px;
            border: 3px solid white;
        }

        .back-btn {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: #2196f3;
            color: white;
            cursor: pointer;
        }

        .back-btn:hover {
            background-color: #0b7dda;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Scan QR & Pay ₹10</h2>

        <!-- IMPORTANT: Image must be in same folder -->
        <img src="qrsumit.png" alt="QR Code">

        <br>

        <button class="back-btn" onclick="goBack()">Back</button>
    </div>

    <script>
        function goBack() {
            window.location.href = "index.html";
        }
    </script>

</body>
</html>
