<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan & Pay</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #111;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .box {
            background: #222;
            padding: 30px;
            border-radius: 10px;
        }

        img {
            width: 250px;
            border-radius: 10px;
            margin-top: 15px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: blue;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: darkblue;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Scan QR & Pay ₹10</h2>

    <!-- Image must be in same folder -->
    <img src="qrsumit.png" alt="QR Code">

    <br>

    <button onclick="goBack()">Back</button>
</div>

<script>
    function goBack() {
        window.location.href = "index.html";
    }
</script>

</body>
</html>
