<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan to Pay | Good Luck Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
            width: 90%;
        }

        h2 {
            margin-bottom: 0.5rem;
            color: #fff;
        }

        p {
            color: #ccc;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .qr-wrapper {
            background: #fff;
            padding: 15px;
            border-radius: 15px;
            display: inline-block;
            margin-bottom: 2rem;
            width: 250px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .qr-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 5px;
        }

        .fallback-text {
            color: #333;
            font-size: 0.9rem;
            display: none;
        }

        .back-btn {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Complete Payment</h2>
        <p>Scan the QR code below to pay ₹10</p>

        <div class="qr-wrapper">
            <img src="qrkunal.png" alt="Payment QR Code" id="qrImage">
            <div class="fallback-text" id="fallback">QR Image Missing</div>
        </div>

        <br>
        <a href="index.html" class="back-btn">← Cancel and Go Back</a>
    </div>

    <script>
        const qrImage = document.getElementById('qrImage');
        const fallback = document.getElementById('fallback');

        // If image fails to load (e.g., wrong filename or not uploaded yet)
        qrImage.onerror = function() {
            qrImage.style.display = 'none';
            fallback.style.display = 'block';
            fallback.innerHTML = "⚠️ QR Image (qrkunal.png) not found in repository.";
        };
    </script>
</body>
</html>
