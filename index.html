<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Luck Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff9966, #ff5e62);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            background: #ff5722;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #e64a19;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>✨ 10 Rupees Good Luck Website ✨</h1>
        <p>Click below to try your luck!</p>

        <button onclick="goToQR()">Pay Now</button>
    </div>

    <script>
        function goToQR() {
            window.location.href = "qr.html";
        }
    </script>

</body>
</html>
