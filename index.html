<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Luck Hub | 10 Rupees</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #4ecca3;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            line-height: 1.5;
            color: #ccc;
        }

        .price-tag {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 2rem;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .currency {
            font-size: 1.5rem;
            color: #4ecca3;
        }

        .pay-btn {
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(78, 204, 163, 0.3);
        }

        .pay-btn:hover {
            background: #45b691;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(78, 204, 163, 0.4);
        }

        .pay-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Good Luck Hub</h1>
        <p>Unlock your daily dose of good fortune and positive energy!</p>
        
        <div class="price-tag">
            <span class="currency">₹</span>10
        </div>

        <button class="pay-btn" id="payButton">Pay Now</button>
    </div>

    <script>
        // Smooth transition to the QR page
        document.getElementById('payButton').addEventListener('click', function() {
            // Optional: You can add an animation or loader here before redirecting
            window.location.href = 'qr.html';
        });
    </script>
</body>
</html>
